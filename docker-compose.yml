services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        API_BASE_URL: http://backend:8081
    ports:
      - "8080:8080"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8081:8081"
    volumes:
      - backend-data:/data

  # Postgres is included now so it is ready when the backend migrates from SQLite.
  # The backend does not connect to it yet.
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: wasm
      POSTGRES_PASSWORD: wasm
      POSTGRES_DB: wasm_registry
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  backend-data:
  postgres-data:
