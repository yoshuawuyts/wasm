name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - staging
      - trying

env:
  RUSTFLAGS: -Dwarnings

jobs:
  build_and_test:
    name: Build and test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
        rust: [stable]

    steps:
    - uses: actions/checkout@master

    - name: Run sccache-cache only on non-release runs
      if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Set Rust caching env vars only on non-release runs
      if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
      run: |
        echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
        echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

    - name: Install ${{ matrix.rust }}
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy
        override: true

    - name: Install sqlite3def (Linux)
      if: runner.os == 'Linux'
      run: |
        curl -sL https://github.com/sqldef/sqldef/releases/latest/download/sqlite3def_linux_amd64.tar.gz | tar xz
        sudo mv sqlite3def /usr/local/bin/

    - name: Install sqlite3def (macOS)
      if: runner.os == 'macOS'
      run: |
        curl -sL https://github.com/sqldef/sqldef/releases/latest/download/sqlite3def_darwin_arm64.tar.gz | tar xz
        sudo mv sqlite3def /usr/local/bin/

    - name: Install sqlite3def (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://github.com/sqldef/sqldef/releases/latest/download/sqlite3def_windows_amd64.zip" -OutFile sqlite3def.zip
        Expand-Archive sqlite3def.zip -DestinationPath .
        Move-Item sqlite3def.exe C:\Windows\system32\sqlite3def.exe

    - name: Run xtask test
      run: cargo xtask test

  check_docs:
    name: Checking docs
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master

    - name: Run sccache-cache only on non-release runs
      if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Set Rust caching env vars only on non-release runs
      if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
      run: |
        echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
        echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

    - uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    - name: Docs
      run: cargo doc
